<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Food Truck</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

<header class="bg-gray-900 text-white py-4 mb-6">
    <div class="max-w-6xl mx-auto px-4">
        <h1 class="text-2xl font-bold">Mini Food Truck</h1>
    </div>
</header>

<main class="max-w-6xl mx-auto px-4">
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <section class="lg:col-span-2">
            <h2 class="text-xl font-semibold mb-4">Menu</h2>
            <div id="menu" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4"></div>
        </section>

        <aside>
            <div class="bg-white rounded-lg shadow">
                <div class="border-b px-4 py-3">
                    <h2 class="text-lg font-semibold">Panier</h2>
                </div>
                <div class="p-4">
                    <div id="cart-items">
                        <p class="text-gray-500">Votre panier est vide.</p>
                    </div>
                    <hr class="my-3">
                    <div class="flex justify-between font-semibold">
                        <span>Total :</span>
                        <span id="cart-total">0.00 €</span>
                    </div>
                </div>
                <div class="border-t p-4">
                    <button id="btn-order" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                        Commander
                    </button>
                </div>
            </div>
        </aside>
    </div>

    <section class="mt-10">
        <h2 class="text-xl font-semibold mb-4">Commandes en cours</h2>
        <div id="orders" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
    </section>
</main>

<div id="orderModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/50">
    <div class="bg-white rounded-lg shadow-lg w-full max-w-md mx-4">
        <div class="flex justify-between items-center border-b px-4 py-3">
            <h5 class="font-semibold">Récapitulatif de commande</h5>
            <button type="button" id="btn-close-modal" class="text-gray-500 hover:text-gray-800 text-xl">&times;</button>
        </div>
        <div class="p-4">
            <div id="order-summary"></div>
        </div>
        <div class="flex justify-end gap-2 border-t px-4 py-3">
            <button type="button" id="btn-cancel-modal" class="px-4 py-2 rounded border border-gray-300 hover:bg-gray-100">Annuler</button>
            <button type="button" id="btn-confirm-order" class="px-4 py-2 rounded bg-green-600 text-white hover:bg-green-700">Valider</button>
        </div>
    </div>
</div>

<div id="notification" class="hidden fixed bottom-4 right-4 px-4 py-3 rounded-lg shadow-lg text-white">
    Message...
</div>

<script src="./js/app.js"></script>
</body>
</html>
